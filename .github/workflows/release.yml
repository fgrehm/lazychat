name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test

      - name: Cross-compile binaries
        run: |
          mkdir -p dist
          for target in bun-linux-x64 bun-linux-arm64 bun-darwin-x64 bun-darwin-arm64; do
            asset="lazychat-${target#bun-}"
            echo "Building $asset..."
            bun build --compile --target="$target" --outfile "dist/$asset" src/cli/index.ts
          done
          ls -lh dist/

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          awk -v ver="v${VERSION}" '
            /^## / { if (p) exit; if ($2 == ver) { p=1; next } }
            p
          ' CHANGELOG.md > release-notes.md
          echo "--- release notes ---"
          cat release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" dist/* \
            --title "$TAG" \
            --notes-file release-notes.md
